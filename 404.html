<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — The Grove of Tau Ceti</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@200;400&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans', sans-serif;
      font-weight: 200;
      background: #0c0c0c;
      color: #e6e6e6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 0 1rem;
      line-height: 1.6;
    }

    .error-logo {
      max-width: 160px;
      width: 100%;
      margin-top: 2rem;
      margin-bottom: 0;
      opacity: 0;
      animation: fadeIn 1.2s ease-in-out forwards;
    }

    .error-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 7rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: glyphReveal 2s ease-out 0.4s forwards;

      background: linear-gradient(
        90deg,
        #243352,
        #3d5a87,
        #3b9eea,
        #85c5ff,
        #7b9ab8,
        #5b5878,
        #c9a84c,
        #c44a3a,
        #5b5878,
        #7b9ab8,
        #3b9eea,
        #3d5a87,
        #243352
      );
      background-size: 500% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;

      animation:
        glyphReveal 2s ease-out 0.4s forwards,
        colorSweep 12s ease-in-out 2.4s infinite,
        glowThrob 3s ease-in-out 2.4s infinite;
    }

    .error-message {
      max-width: 420px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeIn 1.6s ease-in-out 0.8s forwards;
    }

    .error-message p {
      font-weight: 200;
      font-size: 1.05rem;
      line-height: 1.75;
      color: #7b9ab8;
      margin-bottom: 0.75rem;
    }

    .error-message p:first-child {
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      color: #e6e6e6;
      margin-bottom: 1rem;
    }

    .error-home {
      opacity: 0;
      animation: fadeIn 1.6s ease-in-out 1.2s forwards;
    }

    .error-home a {
      font-family: 'Orbitron', sans-serif;
      text-decoration: none;
      color: #e6e6e6;
      border: 1px solid #3b9eea;
      padding: 0.5rem 1.5rem;
      border-radius: 4px;
      transition: background 0.3s, color 0.3s;
      font-size: 0.9rem;
    }

    .error-home a:hover {
      background: #3b9eea;
      color: #000;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes glyphReveal {
      0% {
        opacity: 0;
      }
      40% {
        opacity: 1;
      }
      100% {
        opacity: 1;
      }
    }

    @keyframes glowThrob {
      0%, 100% {
        filter: drop-shadow(0 0 0 rgba(59, 158, 234, 0));
      }
      50% {
        filter: drop-shadow(0 0 18px rgba(59, 158, 234, 0.35));
      }
    }

    @keyframes colorSweep {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 768px) {
      .error-code { font-size: 4.5rem; }
      .error-message p { font-size: 0.95rem; }
      .error-logo { max-width: 130px; }
    }
  </style>
</head>
<body>

  <img src="grove-white.png" alt="The Grove of Tau Ceti" class="error-logo">

  <div class="error-content">
    <div class="error-code">404</div>

    <div class="error-message">
      <p>The Grove has already been here.</p>
      <p>Whatever was at this location has been folded back into the rootwork. The signal is gone, the corridor dark. Nothing remains to be found.</p>
    </div>

    <div class="error-home">
      <a href="/">Return to Demeter</a>
    </div>
  </div>

</body>
</html>
